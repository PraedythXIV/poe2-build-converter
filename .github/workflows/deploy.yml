name: Deploy to GitHub Pages

# Builds the app and publishes the multi-file, content-hashed dist/ to GitHub Pages.
# MANUAL ONLY — nothing deploys on push; YOU run it from the Actions tab ("Run workflow") when ready.
# Requires: repo is Public (free Pages) and Settings → Pages → Source = "GitHub Actions".

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; let an in-progress run finish rather than cancelling a live deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22 # keep all workflows on the same Node (data-refresh.yml set the pace)
          cache: npm
      - run: npm ci
      - run: npm run build # tsc --noEmit && vite build → multi-file, content-hashed dist/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
